version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: autonomous-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  mongodb:
    image: mongo:latest
    container_name: autonomous-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  ollama_data:
  mongodb_data:
