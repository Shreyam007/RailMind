name: Autonomous Self-Improvement Loop

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  autonomous-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f autonomous/requirements.txt ]; then pip install -r autonomous/requirements.txt; fi

      - name: Start Ollama Server
        run: |
          docker run -d -v ollama:/root/.ollama -p 11434:11434 --name ollama ollama/ollama
          echo "Waiting for Ollama to start..."
          sleep 10
          docker exec ollama ollama pull llama3.1

      - name: Run Autonomous Orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_HOST: http://127.0.0.1:11434
          PYTHONPATH: .
        run: |
          python autonomous/orchestrator.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: autonomous repository improvements"
          title: "🤖 Autonomous Improvements: Code, Docs & Security"
          body: |
            This PR was automatically generated by the RailMind Autonomous Operating System.

            It includes:
            - Documentation updates
            - Security patches
            - Code refactoring
            - Architectural analysis

            Please review the changes carefully.
          branch: "autonomous/improvements-${{ github.run_id }}"
          delete-branch: true
