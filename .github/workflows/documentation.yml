name: Autonomous Documentation Generation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f autonomous/requirements.txt ]; then pip install -r autonomous/requirements.txt; fi

      - name: Start Ollama Server
        run: |
          docker run -d -v ollama:/root/.ollama -p 11434:11434 --name ollama ollama/ollama
          echo "Waiting for Ollama to start..."
          sleep 10
          docker exec ollama ollama pull llama3.1

      - name: Run Documentation Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_HOST: http://127.0.0.1:11434
          PYTHONPATH: .
        run: |
          python autonomous/agents/documentation_agent.py
          python autonomous/agents/architecture_agent.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generate documentation and diagrams"
          file_pattern: "README.md docs/**/*.md docs/architecture/**/*.md"
